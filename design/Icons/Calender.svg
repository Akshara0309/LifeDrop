    <!-- Date Squares -->
    <rect x="18" y="28" width="6" height="6" rx="1" fill="#E53935"></rect>
    <rect x="30" y="28" width="6" height="6" rx="1" fill="#2F80ED"></rect>
    <rect x="42" y="28" width="6" height="6" rx="1" fill="#2F80ED"></rect>

    <rect x="18" y="40" width="6" height="6" rx="1" fill="#2F80ED"></rect>
    <rect x="30" y="40" width="6" height="6" rx="1" fill="#2F80ED"></rect>
